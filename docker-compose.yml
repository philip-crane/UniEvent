version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: unievent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: unievent
      MYSQL_USER: unievent_user
      MYSQL_PASSWORD: unievent_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - unievent-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unievent-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/unievent?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      # location inside container where media will be stored
      UNIEVENT_MEDIA_LOCATION: /app/media
    ports:
      - "8080:8080"
    volumes:
      - media-data:/app/media
    networks:
      - unievent-network

volumes:
  mysql-data:
  media-data:

networks:
  unievent-network:
    driver: bridge
