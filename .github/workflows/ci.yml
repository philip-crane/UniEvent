name: CI

on:
  push:
    branches: [main, de-firebasing]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw test -B

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: docker build -t unievent-app:ci .

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          docker build ./web \
            --build-arg VITE_BACKEND_URL= \
            --build-arg VITE_FACEBOOK_APP_ID= \
            --build-arg VITE_ORGANIZER_SIGNUP_PASSWORD= \
            -t unievent-frontend:ci
