name: Deploy Live

on:
  push:
    branches:
      - live
  workflow_dispatch:

concurrency:
  group: deploy-live
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIVE_DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIVE_DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on remote host
        env:
          DEPLOY_HOST: ${{ secrets.LIVE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.LIVE_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.LIVE_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=20 -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'EOF'
          set -euo pipefail

          cd "${DEPLOY_PATH}"
          git fetch origin
          git checkout live
          git reset --hard origin/live

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD='docker compose'
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD='docker-compose'
          else
            echo 'Neither docker compose plugin nor docker-compose binary is installed on the server.'
            exit 1
          fi
          
          # Full cleanup: stop services, remove containers/volumes, and reset network state
          ${COMPOSE_CMD} down --volumes --remove-orphans || true
          
          # Prune dangling networks that may hold stale bindings
          docker network prune -f || true

          # Force remove any container (from any project) that still publishes 80/443.
          # This avoids intermittent "bind: address already in use" for nginx startup.
          for port in 80 443; do
            port_conflicts="$(docker ps -aq --filter "publish=${port}")"
            if [ -n "${port_conflicts}"; then
              echo "Removing containers that publish host port ${port}:"
              docker ps -a --filter "publish=${port}" --format "- {{.ID}} {{.Names}} {{.Ports}}"
              docker rm -f ${port_conflicts} || true
            fi
          done

          # If host processes (not containers) still occupy ports, fail early with diagnostics.
          if command -v ss >/dev/null 2>&1; then
            if ss -ltn | grep -Eq ':(80|443)\s'; then
              echo 'Ports 80/443 are still in use by a host process after container cleanup.'
              ss -ltnp | grep -E ':(80|443)\s' || true
              exit 1
            fi
          fi

          # Build and start fresh services
          ${COMPOSE_CMD} up -d --build
          ${COMPOSE_CMD} ps
          EOF
