spring:
  application:
    name: web
  
  datasource:
    url: jdbc:mysql://localhost:3306/unievent?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

unievent:
  media:
    # directory relative to working directory or absolute path
    location: ${UNIEVENT_MEDIA_LOCATION:/app/media}
