spring:
  application:
    name: web
  config:
    import:
      - classpath:mysql.yaml
      - classpath:vault.yaml
      - classpath:seaweedfs.yaml
      - classpath:facebook.yaml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized

unievent:
  security:
    allowed-origins: ${UNIEVENT_SECURITY_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
